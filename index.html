<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دكتور أبانوب بديع - كيمياء المرحلة الثانوية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Cairo', system-ui, sans-serif; }
        .chemical-bg { background: linear-gradient(135deg, #0f172a 0%, #1e1135 100%); }
        .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.15); }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">

    <!-- Top Announcement -->
    <div id="announcement-bar" class="bg-gradient-to-r from-teal-600 via-emerald-600 to-teal-600 text-white py-3 px-4 text-center font-medium shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-center items-center gap-x-3">
            <i class="fas fa-fire text-xl animate-pulse"></i>
            <span id="announcement-text" class="text-lg font-semibold">🔥 متاح الآن الكورس التأسيسي لكيمياء الصف الثالث الثانوي 🔥</span>
            <i class="fas fa-fire text-xl animate-pulse"></i>
        </div>
    </div>

    <!-- Navbar -->
    <nav class="bg-slate-900 border-b border-slate-800 sticky top-[52px] z-40">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-12 h-12 bg-gradient-to-br from-teal-500 to-emerald-600 rounded-2xl flex items-center justify-center">
                    <i class="fas fa-flask text-white text-3xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tighter">دكتور أبانوب بديع</h1>
                    <p class="text-[10px] text-teal-400 -mt-1">كيمياء المرحلة الثانوية</p>
                </div>
            </div>
            <button onclick="document.getElementById('booking').scrollIntoView({ behavior: 'smooth' })" 
                    class="px-6 py-2.5 bg-white text-slate-900 font-semibold rounded-2xl flex items-center gap-x-2">
                <i class="fas fa-calendar-check"></i>
                <span>احجز الآن</span>
            </button>
        </div>
    </nav>

    <!-- Hero -->
    <section id="hero" class="chemical-bg min-h-[82vh] flex items-center">
        <div class="max-w-5xl mx-auto px-6 text-center">
            <h1 class="text-6xl md:text-7xl font-extrabold tracking-tighter mb-4">دكتور أبانوب بديع</h1>
            <p class="text-2xl text-slate-300 mb-8">خبير كيمياء المرحلة الثانوية</p>
            
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <button onclick="document.getElementById('join-course').scrollIntoView({ behavior: 'smooth' })" 
                        class="px-10 py-4 bg-white text-slate-900 font-bold rounded-3xl text-lg">انضم للكورس التأسيسي</button>
                <button onclick="document.getElementById('booking').scrollIntoView({ behavior: 'smooth' })" 
                        class="px-8 py-4 border border-white/30 font-semibold rounded-3xl text-lg">احجز درس</button>
            </div>
        </div>
    </section>

    <!-- NEW: Slideshow Section -->
    <section class="max-w-6xl mx-auto px-6 py-16">
        <div class="text-center mb-10">
            <span class="px-4 py-1 bg-emerald-900/50 text-emerald-400 text-sm font-semibold rounded-3xl">فخرنا</span>
            <h2 class="text-4xl font-extrabold tracking-tight mt-3">صور الأوائل والدفعات</h2>
        </div>

        <div class="relative max-w-4xl mx-auto">
            <div id="carousel" class="overflow-hidden rounded-3xl shadow-2xl">
                <div id="carousel-inner" class="flex transition-transform duration-700 ease-in-out">
                    <!-- الصور هتتضاف تلقائي -->
                </div>
            </div>

            <button onclick="prevSlide()" class="absolute left-4 top-1/2 -translate-y-1/2 bg-white/90 text-slate-900 w-11 h-11 rounded-full flex items-center justify-center shadow-lg">
                <i class="fas fa-chevron-left"></i>
            </button>
            <button onclick="nextSlide()" class="absolute right-4 top-1/2 -translate-y-1/2 bg-white/90 text-slate-900 w-11 h-11 rounded-full flex items-center justify-center shadow-lg">
                <i class="fas fa-chevron-right"></i>
            </button>

            <div id="carousel-dots" class="flex justify-center gap-x-2 mt-6"></div>
        </div>
    </section>

    <!-- Join Course Section (معدل) -->
    <section id="join-course" class="max-w-4xl mx-auto px-6 pb-12">
        <div class="glass p-10 rounded-3xl text-center border border-teal-500/30">
            <h2 class="text-3xl font-bold mb-4">انضم الآن للكورس التأسيسي</h2>
            <p class="text-slate-300 mb-6">املأ بياناتك وسيتم التواصل معك فوراً</p>
            
            <button onclick="joinFoundationalCourseWithName()" 
                    class="px-10 py-4 bg-emerald-500 hover:bg-emerald-600 text-white font-bold text-xl rounded-3xl flex items-center gap-x-3 mx-auto">
                <i class="fab fa-whatsapp text-2xl"></i>
                <span>انضم عبر واتساب</span>
            </button>
        </div>
    </section>

    <!-- Booking Section -->
    <section id="booking" class="max-w-3xl mx-auto px-6 pb-20">
        <div class="text-center mb-8">
            <h2 class="text-4xl font-extrabold">احجز الآن</h2>
        </div>
        
        <div class="booking-card glass p-8 md:p-10 rounded-3xl">
            <form id="booking-form" class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold mb-2">الاسم بالكامل</label>
                    <input type="text" id="full-name" required class="form-input w-full bg-slate-900 border border-slate-700 px-5 py-3.5 rounded-2xl text-lg">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">رقم الهاتف</label>
                    <input type="tel" id="phone" required class="form-input w-full bg-slate-900 border border-slate-700 px-5 py-3.5 rounded-2xl text-lg">
                </div>
                <button type="submit" class="w-full py-4 bg-gradient-to-r from-teal-500 to-emerald-500 text-white font-extrabold text-xl rounded-3xl flex items-center justify-center gap-x-3">
                    <i class="fab fa-whatsapp text-2xl"></i>
                    <span>احجز الآن عبر واتساب</span>
                </button>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer class="border-t border-slate-800 bg-slate-900 py-8">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center text-sm">
            <p>© كيرلس نبيل - جميع الحقوق محفوظة</p>
            <button onclick="showPasswordModal()" class="flex items-center gap-x-2 text-xs text-slate-400 hover:text-teal-400">
                <i class="fas fa-user-lock"></i>
                <span>خيارات المطور</span>
            </button>
        </div>
    </footer>

    <script>
        // ==================== كل الصور (ضيف كل الأسماء هنا) ====================
        let slides = [
            { src: "images/FB_IMG_1782778195919.jpg", caption: "" },
            { src: "images/FB_IMG_17827339494.jpg", caption: "" },
            { src: "images/FB_IMG_1781278180.jpg", caption: "" },
            { src: "images/FB_IMG_178127819407.jpg", caption: "" },
            { src: "images/FB_IMG_17827084564.jpg", caption: "" },
            { src: "images/FB_IMG_1782709076.jpg", caption: "" },
            { src: "images/FB_IMG_1782707622.jpg", caption: "" },
            { src: "images/FB_IMG_1782708430.jpg", caption: "" },
            { src: "images/FB_IMG_1782708064.jpg", caption: "" },
            { src: "images/FB_IMG_1782706476.jpg", caption: "" },
            { src: "images/FB_IMG_17827072184.jpg", caption: "" },
            { src: "images/FB_IMG_1782706939.jpg", caption: "" },
            { src: "images/FB_IMG_1782705279.jpg", caption: "" },
            { src: "images/FB_IMG_1782703259.jpg", caption: "" },
            { src: "images/FB_IMG_1782705109.jpg", caption: "" },
            { src: "images/FB_IMG_1782705839.jpg", caption: "" },
            { src: "images/FB_IMG_1782705138.jpg", caption: "" },
            { src: "images/FB_IMG_1782703567.jpg", caption: "" },
            { src: "images/FB_IMG_1782704736.jpg", caption: "" },
            { src: "images/FB_IMG_1782704624.jpg", caption: "" },
            { src: "images/FB_IMG_1782704069.jpg", caption: "" },
            { src: "images/FB_IMG_1782701859.jpg", caption: "" },
            { src: "images/FB_IMG_1782706257.jpg", caption: "" },
            { src: "images/FB_IMG_1782703282.jpg", caption: "" },
            { src: "images/FB_IMG_1782704045.jpg", caption: "" },
            { src: "images/FB_IMG_1782708598.jpg", caption: "" },
            { src: "images/FB_IMG_1782706008.jpg", caption: "" },
            { src: "images/FB_IMG_1782703863.jpg", caption: "" },
            { src: "images/FB_IMG_1782701226.jpg", caption: "" },
            { src: "images/FB_IMG_17827019128.jpg", caption: "" },
            { src: "images/FB_IMG_17827016614.jpg", caption: "" },
            { src: "images/FB_IMG_17827014273.jpg", caption: "" },
            { src: "images/FB_IMG_17827011464.jpg", caption: "" },
            { src: "images/FB_IMG_17827006450.jpg", caption: "" },
            { src: "images/FB_IMG_1782700724.jpg", caption: "" },
            { src: "images/FB_IMG_17827006448.jpg", caption: "" },
            { src: "images/FB_IMG_17827799650.jpg", caption: "" },
            { src: "images/FB_IMG_17827796224.jpg", caption: "" },
            { src: "images/FB_IMG_17827779977.jpg", caption: "" }
            // لو فيه صور زيادة، ضيفها بنفس الشكل
        ];

        let currentSlide = 0;
        let carouselInterval;

        function renderCarousel() {
            const inner = document.getElementById('carousel-inner');
            const dotsContainer = document.getElementById('carousel-dots');
            inner.innerHTML = '';
            dotsContainer.innerHTML = '';

            slides.forEach((slide, index) => {
                const slideDiv = document.createElement('div');
                slideDiv.className = `min-w-full flex-shrink-0 relative`;
                slideDiv.innerHTML = `
                    <img src="${slide.src}" class="w-full h-[420px] object-cover rounded-3xl" alt="">
                    <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/70 to-transparent p-6 rounded-b-3xl">
                        <p class="text-white text-lg font-semibold">${slide.caption || ''}</p>
                    </div>
                `;
                inner.appendChild(slideDiv);

                const dot = document.createElement('button');
                dot.className = `w-3 h-3 rounded-full transition-all ${index === currentSlide ? 'bg-teal-400 w-6' : 'bg-slate-600'}`;
                dot.onclick = () => goToSlide(index);
                dotsContainer.appendChild(dot);
            });
        }

        function updateCarousel() {
            const inner = document.getElementById('carousel-inner');
            inner.style.transform = `translateX(-${currentSlide * 100}%)`;
            
            document.querySelectorAll('#carousel-dots button').forEach((dot, index) => {
                dot.className = `w-3 h-3 rounded-full transition-all ${index === currentSlide ? 'bg-teal-400 w-6' : 'bg-slate-600'}`;
            });
        }

        function nextSlide() {
            currentSlide = (currentSlide + 1) % slides.length;
            updateCarousel();
        }

        function prevSlide() {
            currentSlide = (currentSlide - 1 + slides.length) % slides.length;
            updateCarousel();
        }

        function goToSlide(index) {
            currentSlide = index;
            updateCarousel();
        }

        function startAutoSlide() {
            clearInterval(carouselInterval);
            carouselInterval = setInterval(nextSlide, 3500);
        }

        function initCarousel() {
            renderCarousel();
            updateCarousel();
            startAutoSlide();

            const carousel = document.getElementById('carousel');
            carousel.addEventListener('mouseenter', () => clearInterval(carouselInterval));
            carousel.addEventListener('mouseleave', startAutoSlide);
        }

        // ==================== تعديل زرار الكورس (يطلب الاسم) ====================
        function joinFoundationalCourseWithName() {
            const name = prompt("من فضلك اكتب اسمك:");
            if (!name) return;

            const message = `📚 طلب انضمام للكورس التأسيسي\n\n👤 الاسم: ${name}\n🎓 الصف: الصف الثالث الثانوي`;
            window.open(`https://wa.me/201288705982?text=${encodeURIComponent(message)}`, '_blank');
        }

        // ==================== Booking Form ====================
        document.getElementById('booking-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('full-name').value;
            const phone = document.getElementById('phone').value;

            const message = `📚 طلب حجز جديد\n\n👤 الاسم: ${name}\n📱 رقم الهاتف: ${phone}\n🎓 الصف: الصف الثالث الثانوي`;
            window.open(`https://wa.me/201288705982?text=${encodeURIComponent(message)}`, '_blank');
            alert("تم فتح واتساب!");
            this.reset();
        });

        function init() {
            initCarousel();
            console.log("%c[دكتور أبانوب بديع] الموقع جاهز مع كل الصور", "color:#14b8a6");
        }

        window.onload = init;
    </script>
</body>
        </html>
